  - title: HellasDB
    description: >-
      A structured database of Greek geographic and linguistic data, supporting
      toponymic and dialectal research.
    description_es: >-
      Una base de datos estructurada de datos geográficos y lingüísticos griegos,
      que apoya la investigación toponímica y dialectal.
    description_el: >-
      Μια δομημένη βάση δεδομένων ελληνικών γεωγραφικών και γλωσσολογικών δεδομένων,
      που υποστηρίζει τοπωνυμική και διαλεκτολογική έρευνα.
    category: Data
    category_es: Datos
    category_el: Δεδομένα
    url: https://github.com/jgchaparro/HellasDB
    status: ready

  - title: Exploring the Geography of Greek Toponyms
    title_es: Explorando la Geografía de los Topónimos Griegos
    title_el: Εξερεύνηση της Γεωγραφίας των Ελληνικών Τοπωνυμίων
    description: >-
      A data-driven analysis of geographic patterns in Greek place names using the Hellas DB database
      of 12,904 settlements, revealing how regional suffixes, administrative divisions, and linguistic
      features create distinct naming patterns across mainland Greece and islands.
    description_es: >-
      Un análisis basado en datos de los patrones geográficos en los topónimos griegos usando la base
      de datos Hellas DB de 12.904 asentamientos, que revela cómo los sufijos regionales, las divisiones
      administrativas y los rasgos lingüísticos crean patrones de nomenclatura distintos en la Grecia
      continental y las islas.
    description_el: >-
      Μια δεδομένα-κεντρική ανάλυση των γεωγραφικών μοτίβων στα ελληνικά τοπωνύμια χρησιμοποιώντας
      τη βάση δεδομένων Hellas DB των 12.904 οικισμών, αποκαλύπτοντας πώς τα περιφερειακά επιθήματα,
      οι διοικητικές διαιρέσεις και τα γλωσσολογικά χαρακτηριστικά δημιουργούν διακριτά μοτίβα
      ονοματολογίας στην ηπειρωτική Ελλάδα και τα νησιά.
    category: Research
    category_es: Investigación
    category_el: Έρευνα
    url: /research/greek-toponyms-geography
    image: /images/greek-toponyms-header.png
    status: ready

